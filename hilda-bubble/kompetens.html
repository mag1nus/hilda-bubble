<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kompetenskarta</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23141f69'/%3E%3Ccircle cx='24' cy='24' r='13' fill='%23d7f2fb' stroke='%2300abe1' stroke-width='4'/%3E%3Ccircle cx='42' cy='38' r='16' fill='%23ffffff' stroke='%2300abe1' stroke-width='4'/%3E%3Ccircle cx='42' cy='38' r='7' fill='%23abd9b8'/%3E%3Cpath d='M14 50h36' stroke='%2300abe1' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root {
      --brand-blue: #141f69;
      --brand-cyan: #00abe1;
      --brand-sky: #d7f2fb;
      --brand-ice: #f4fbfe;
      --brand-mist: #edf8fc;
      --ink: #141f30;
      --paper: #f7fbfd;
      --panel: #ffffff;
      --line: #141f69;
      --muted: #586377;
      --accent: #00abe1;
      --accent-dark: #007ca8;
      --warning: #ffe2b8;
      --danger: #b00020;
      --traffic-red: #f4b3b3;
      --traffic-orange: #f8d486;
      --traffic-green: #abd9b8;
      --shadow: 0 18px 48px rgba(20, 31, 105, 0.11);
      --ring-shadow: drop-shadow(0 12px 20px rgba(20, 31, 105, 0.08));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(0, 171, 225, 0.13), transparent 28%),
        radial-gradient(circle at 82% 4%, rgba(20, 31, 105, 0.08), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, var(--paper) 52%, #ffffff 100%),
        var(--paper);
      font-family: "Source Sans Pro", "Source Sans 3", "Segoe UI", Frutiger, sans-serif;
    }

    button,
    input,
    input {
      font: inherit;
    }

    .shell {
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    header {
      display: grid;
      justify-items: center;
      gap: 8px;
      padding: 10px 0 14px;
      text-align: center;
    }

    header::before {
      content: "Region Norrbotten";
      width: fit-content;
      padding: 6px 12px;
      background: var(--brand-blue);
      color: white;
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: 0;
      border-radius: 2px;
    }

    h1 {
      margin: 0;
      color: #202124;
      font-size: clamp(2.7rem, 5.6vw, 5.1rem);
      line-height: 0.96;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: #4f5665;
      font-size: clamp(1.2rem, 2.3vw, 1.9rem);
      line-height: 1.2;
    }

    .status {
      width: min(760px, 100%);
      margin: 8px 0 0;
      padding: 9px 14px;
      border: 1px solid rgba(20, 31, 105, 0.2);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: inset 5px 0 0 var(--brand-cyan);
      color: var(--muted);
      font-size: 0.95rem;
      text-align: left;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
      margin: 12px 0 14px;
    }

    .tab {
      border: 1px solid var(--brand-blue);
      background: var(--panel);
      color: var(--brand-blue);
      min-height: 42px;
      min-width: 120px;
      padding: 8px 18px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: none;
    }

    .tab + .tab {
      border-left: 0;
    }

    .tab[aria-selected="true"] {
      background: var(--brand-blue);
      color: white;
      box-shadow: inset 0 -4px 0 var(--brand-cyan);
    }

    main {
      border: 1px solid rgba(20, 31, 105, 0.14);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel {
      display: none;
      min-height: 690px;
    }

    .panel.active {
      display: block;
    }

    .graph-wrap {
      position: relative;
      height: clamp(760px, 92vw, 1320px);
      min-height: 760px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(0, 171, 225, 0.09), transparent 37%),
        linear-gradient(180deg, #ffffff 0%, var(--brand-ice) 100%);
    }

    .graph-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid rgba(20, 31, 105, 0.12);
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(20, 31, 105, 0.45);
      border-radius: 50%;
    }

    .swatch.red { background: var(--traffic-red); }
    .swatch.orange { background: var(--traffic-orange); }
    .swatch.green { background: var(--traffic-green); }

    .tool-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 560px;
    }

    .pack-root {
      fill: rgba(215, 242, 251, 0.52);
      stroke: var(--brand-blue);
      stroke-width: 2;
      stroke-dasharray: 8 7;
      cursor: zoom-out;
    }

    .pack-cluster-group {
      cursor: zoom-in;
    }

    .pack-cluster {
      stroke-width: 2.5;
      fill-opacity: 0.28;
      filter: var(--ring-shadow);
    }

    .pack-cluster-group:hover .pack-cluster,
    .pack-cluster-group:focus .pack-cluster {
      fill-opacity: 0.4;
      stroke-width: 3.4;
    }

    .pack-cluster-group.is-zoomed {
      cursor: zoom-out;
    }

    .pack-cluster-group.is-zoomed .pack-cluster {
      fill-opacity: 0.4;
      stroke-width: 3.4;
    }

    .pack-competence {
      stroke: #64748b;
      stroke-width: 1.8;
      fill-opacity: 0.9;
      filter: drop-shadow(0 7px 12px rgba(20, 31, 105, 0.08));
    }

    .pack-label {
      fill: var(--ink);
      font-family: "Source Sans Pro", "Source Sans 3", "Segoe UI", Frutiger, sans-serif;
      paint-order: stroke;
      stroke: white;
      stroke-width: 5px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .pack-cluster-label {
      font-weight: 800;
      fill: #1f2937;
    }

    .pack-competence-name {
      font-weight: 800;
    }

    .pack-person-name {
      fill: var(--muted);
    }

    .data-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 18px;
      border-bottom: 1px solid rgba(20, 31, 105, 0.14);
      background: var(--brand-mist);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(130px, 1fr)) auto;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 42px;
      padding: 8px 10px;
      border: 2px solid rgba(20, 31, 105, 0.32);
      background: white;
      color: var(--ink);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .file-actions {
      justify-content: flex-end;
      max-width: 620px;
    }

    .btn {
      min-height: 42px;
      border: 2px solid var(--brand-blue);
      background: white;
      color: var(--brand-blue);
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: none;
    }

    .btn.primary {
      background: var(--brand-blue);
      color: white;
    }

    .btn.danger {
      background: #fff;
      color: var(--danger);
      box-shadow: none;
    }

    .file-input {
      max-width: 280px;
      border: 1px dashed rgba(20, 31, 105, 0.45);
      background: white;
    }

    .btn:focus,
    .tab:focus,
    input:focus {
      outline: 3px solid var(--brand-cyan);
      outline-offset: 2px;
    }

    .table-wrap {
      overflow: auto;
      max-height: 570px;
    }

    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
      background: white;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid rgba(47, 52, 55, 0.24);
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--brand-blue);
      color: white;
      font-size: 0.84rem;
      text-transform: uppercase;
    }

    td input {
      min-height: 36px;
      border-width: 1px;
      background: white;
    }

    .row-index {
      width: 58px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .empty {
      padding: 48px 20px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      header,
      .data-tools,
      .form-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: clamp(2.2rem, 12vw, 3.4rem);
      }

      .graph-tools {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .file-actions {
        max-width: none;
      }

      .shell {
        width: min(100% - 20px, 1220px);
        padding-top: 14px;
      }

      svg,
      .graph-wrap {
        height: clamp(620px, 118vw, 880px);
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Kompetenskarta</h1>
      <p class="subtitle">Grupperad efter kluster, kompetens och namn</p>
      <p class="status" id="status">Loaded embedded starter data. Upload a file or edit rows in the data tab.</p>
    </header>

    <nav class="tabs" aria-label="Views">
      <button class="tab" type="button" aria-selected="true" data-panel="graph">Graph</button>
      <button class="tab" type="button" aria-selected="false" data-panel="data">Data</button>
    </nav>

    <main>
      <section class="panel active" id="graph-panel" aria-label="Circle packing graph view">
        <div class="graph-tools">
          <div class="legend" aria-label="Competence count colors">
            <span class="legend-item"><span class="swatch red"></span>&lt;2 names</span>
            <span class="legend-item"><span class="swatch orange"></span>2 names</span>
            <span class="legend-item"><span class="swatch green"></span>&gt;2 names</span>
          </div>
          <div class="tool-actions">
            <button class="btn" type="button" id="reset-graph">Reset View</button>
            <button class="btn primary" type="button" id="save-graph-png">Save PNG</button>
          </div>
        </div>
        <div class="graph-wrap">
          <svg id="graph" viewBox="0 0 1180 660" role="img" aria-label="circlepackeR-style cluster to competence to names hierarchy"></svg>
        </div>
      </section>

      <section class="panel" id="data-panel" aria-label="Data view">
        <div class="data-tools">
          <form class="form-grid" id="add-form">
            <div class="field">
              <label for="competence">Competence</label>
              <input id="competence" name="competence" autocomplete="off" required>
            </div>
            <div class="field">
              <label for="name">Name</label>
              <input id="name" name="name" autocomplete="off" required>
            </div>
            <div class="field">
              <label for="cluster">Cluster</label>
              <input id="cluster" name="cluster" autocomplete="off" required>
            </div>
            <button class="btn primary" type="submit">Add Row</button>
          </form>
          <div class="actions file-actions">
            <input class="file-input" id="csv-file" type="file" accept=".csv,text/csv,text/plain">
            <button class="btn" type="button" id="open-file">Open CSV</button>
            <button class="btn primary" type="button" id="save-file">Save CSV</button>
            <button class="btn" type="button" id="download-file">Download CSV</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Competence</th>
                <th>Name</th>
                <th>Cluster</th>
                <th>Remove</th>
              </tr>
            </thead>
            <tbody id="data-body"></tbody>
          </table>
          <div class="empty" id="empty-state" hidden>No rows yet.</div>
        </div>
      </section>
    </main>
  </div>

  <script type="text/csv" id="seed-data">competence;name;cluster

BST;Noah Berg;BST
akutpediatrik;Maja Holm;akutpediatrik

neuro;Viktor Dahl;Neurologi
CF/lung;Linnea Sjöberg;Neurologi
akut;Oskar Wallin;Neurologi
allergi;Freja Nyström;Neurologi
obesitas;Isak Lund;Gastro/Nutrition
gastro/hep/nutr;Elin Falk;Gastro/Nutrition
ätstörning;Hanna Vik;Gastro/Nutrition
diabetes;Leo Sandberg;Endokrin/Metabol
endokrin;Nora Blom;Endokrin/Metabol
cardio;Anton Frisk;cardio
onk/hem;Klara Westin;onk/hem
smärta;Malte Roos;smärta
infektion;Ida Gran;infektion
reuma;Emil Ström;reuma
nefro;Tuva Hall;nefro
APA;Magnus;1
APA;Hilda;1
APA;Test;1</script>

  <script>
    const headers = ["competence", "name", "cluster"];
    const palette = [
      { fill: "#dbeafe", stroke: "#264766" },
      { fill: "#dcfce7", stroke: "#416f4d" },
      { fill: "#fef3c7", stroke: "#9a7a34" },
      { fill: "#fce7f3", stroke: "#865269" },
      { fill: "#ede9fe", stroke: "#5e4a78" },
      { fill: "#ccfbf1", stroke: "#367266" },
      { fill: "#fee2e2", stroke: "#8d4b4b" },
    ];
    const competenceTitleBaseSize = 34;
    const competenceNameBaseSize = 28;
    const competenceTitleMinSize = 24;
    const competenceTitleMaxSize = 54;
    const competenceNameMinSize = 20;
    const competenceNameMaxSize = 46;
    const competenceBlockGap = 8;
    const competencePadding = 3;
    const competenceTextSafety = 1.01;
    const competenceLabelStrokePadding = 3;
    const competenceExtraNamePadding = 4;
    const graphDefaultWidth = 1180;
    const graphDefaultHeight = 660;
    const graphMinWidth = 720;
    const graphMinHeight = 520;
    const graphRootPadding = 4;
    const graphFocusPadding = 6;
    const clusterLabelReserve = 32;
    const clusterLabelTopPadding = 18;
    const clusterLabelBaseSize = 14;
    const storageKey = "kompetenskarta.csv.v1";
    const cookieKey = "kompetenskartaCsvV1";
    const measureCanvas = document.createElement("canvas");
    const measureContext = measureCanvas.getContext("2d");
    const textMeasureCache = new Map();
    let rows = loadInitialRows();
    let fileHandle = null;

    const statusEl = document.getElementById("status");
    const bodyEl = document.getElementById("data-body");
    const emptyEl = document.getElementById("empty-state");
    const graphEl = document.getElementById("graph");
    const csvFileEl = document.getElementById("csv-file");
    let zoomedCluster = null;
    let graphSize = { width: graphDefaultWidth, height: graphDefaultHeight };
    let resizeRenderFrame = null;

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => activatePanel(tab.dataset.panel));
    });

    document.getElementById("add-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      rows.push({
        competence: form.get("competence").trim(),
        name: form.get("name").trim(),
        cluster: form.get("cluster").trim(),
      });
      event.currentTarget.reset();
      persistRows();
      render();
      setStatus("Row added. Save the CSV to persist the change.");
    });

    csvFileEl.addEventListener("change", loadCsvFromFileInput);
    document.getElementById("open-file").addEventListener("click", openCsvFile);
    document.getElementById("save-file").addEventListener("click", saveCsvFile);
    document.getElementById("download-file").addEventListener("click", downloadCsvFile);
    document.getElementById("reset-graph").addEventListener("click", resetGraphZoom);
    document.getElementById("save-graph-png").addEventListener("click", saveGraphPng);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && zoomedCluster) {
        zoomedCluster = null;
        renderGraph();
        setStatus("Showing all clusters.");
      }
    });

    render();
    if (document.fonts && typeof document.fonts.ready?.then === "function") {
      document.fonts.ready.then(() => {
        textMeasureCache.clear();
        renderGraph();
      });
    }
    observeGraphResize();

    function activatePanel(name) {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.panel === name));
      });
      document.querySelectorAll(".panel").forEach((panel) => panel.classList.remove("active"));
      document.getElementById(`${name}-panel`).classList.add("active");
      if (name === "graph") scheduleGraphResize();
    }

    function render() {
      renderTable();
      renderGraph();
    }

    function renderTable() {
      emptyEl.hidden = rows.length > 0;
      bodyEl.innerHTML = rows.map((row, index) => `
        <tr>
          <td class="row-index">${index + 1}</td>
          <td><input aria-label="Competence row ${index + 1}" data-field="competence" data-index="${index}" value="${escapeHtml(row.competence)}"></td>
          <td><input aria-label="Name row ${index + 1}" data-field="name" data-index="${index}" value="${escapeHtml(row.name)}"></td>
          <td><input aria-label="Cluster row ${index + 1}" data-field="cluster" data-index="${index}" value="${escapeHtml(row.cluster)}"></td>
          <td><button class="btn danger" type="button" data-remove="${index}">Remove</button></td>
        </tr>
      `).join("");

      bodyEl.querySelectorAll("input").forEach((input) => {
        input.addEventListener("input", (event) => {
          const target = event.currentTarget;
          rows[Number(target.dataset.index)][target.dataset.field] = target.value;
          persistRows();
          renderGraph();
          setStatus("Data changed. Browser state saved.");
        });
      });

      bodyEl.querySelectorAll("[data-remove]").forEach((button) => {
        button.addEventListener("click", (event) => {
          rows.splice(Number(event.currentTarget.dataset.remove), 1);
          persistRows();
          render();
          setStatus("Row removed. Browser state saved.");
        });
      });
    }

    function loadInitialRows() {
      const seedCsv = document.getElementById("seed-data").textContent.trim();
      try {
        const savedCsv = localStorage.getItem(storageKey) || readCookie(cookieKey);
        if (savedCsv?.trim()) return parseCsv(savedCsv);
      } catch (error) {
        console.warn("Could not load browser state.", error);
      }
      return parseCsv(seedCsv);
    }

    function persistRows() {
      try {
        const csv = serializeCsv(rows);
        localStorage.setItem(storageKey, csv);
        writeCookie(cookieKey, csv);
      } catch (error) {
        console.warn("Could not save browser state.", error);
      }
    }

    function readCookie(name) {
      const prefix = `${encodeURIComponent(name)}=`;
      const match = document.cookie
        .split(";")
        .map((part) => part.trim())
        .find((part) => part.startsWith(prefix));
      return match ? decodeURIComponent(match.slice(prefix.length)) : "";
    }

    function writeCookie(name, value) {
      document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; max-age=31536000; path=/; SameSite=Lax`;
    }

    function observeGraphResize() {
      if (!window.ResizeObserver) {
        window.addEventListener("resize", scheduleGraphResize);
        return;
      }

      const observer = new ResizeObserver(scheduleGraphResize);
      observer.observe(graphEl);
    }

    function scheduleGraphResize() {
      if (resizeRenderFrame !== null) cancelAnimationFrame(resizeRenderFrame);
      resizeRenderFrame = requestAnimationFrame(() => {
        resizeRenderFrame = null;
        const nextSize = readGraphSize();
        if (
          Math.abs(nextSize.width - graphSize.width) < 2 &&
          Math.abs(nextSize.height - graphSize.height) < 2
        ) {
          return;
        }
        graphSize = nextSize;
        textMeasureCache.clear();
        renderGraph();
      });
    }

    function readGraphSize() {
      const rect = graphEl.getBoundingClientRect();
      return {
        width: Math.max(graphMinWidth, Math.round(rect.width || graphEl.clientWidth || graphDefaultWidth)),
        height: Math.max(graphMinHeight, Math.round(rect.height || graphEl.clientHeight || graphDefaultHeight)),
      };
    }

    function renderGraph() {
      graphSize = readGraphSize();
      const groups = groupRows(rows);
      if (groups.length === 0) {
        graphEl.innerHTML = "";
        graphEl.setAttribute("viewBox", `0 0 ${graphSize.width} ${graphSize.height}`);
        return;
      }

      const pack = layoutCirclePack(groups);
      const activeCluster = pack.clusters.find((cluster) => cluster.name === zoomedCluster);
      if (zoomedCluster && !activeCluster) zoomedCluster = null;
      setGraphView(activeCluster || null, pack.root);

      graphEl.innerHTML = `
        <circle class="pack-root" cx="${pack.root.x}" cy="${pack.root.y}" r="${pack.root.r}" tabindex="0" role="button" aria-label="Show all clusters"></circle>
        ${pack.clusters.map((cluster) => `
          <g class="pack-cluster-group${zoomedCluster === cluster.name ? " is-zoomed" : ""}" data-cluster="${escapeHtml(cluster.name)}" tabindex="0" role="button" aria-label="Zoom ${escapeHtml(cluster.name)}">
            <title>${escapeHtml(clusterTooltip(cluster))}</title>
            <circle class="pack-cluster" cx="${cluster.x}" cy="${cluster.y}" r="${cluster.r}" fill="${cluster.color.fill}" stroke="${cluster.color.stroke}"></circle>
            ${cluster.competences.map((competence) => renderCompetenceCircle(competence)).join("")}
            <text class="pack-label pack-cluster-label" x="${cluster.x}" y="${cluster.y - cluster.r + clusterLabelTopPadding}" text-anchor="middle" font-size="${clamp(cluster.r / 10, clusterLabelBaseSize, 24)}">${escapeHtml(cluster.name)}</text>
          </g>
        `).join("")}
      `;
      bindGraphZoomControls();
      setStatus("Graph rendered.");
    }

    function renderCompetenceCircle(competence) {
      return `
        <g>
          <title>${escapeHtml(competenceTooltip(competence))}</title>
          <circle class="pack-competence" cx="${competence.x}" cy="${competence.y}" r="${competence.r}" fill="${competence.fill}"></circle>
          <text class="pack-label pack-competence-name" x="${competence.x}" y="${competence.titleY}" text-anchor="middle" font-size="${competence.titleFontSize}">${escapeHtml(fitLabel(competence.name, competence.r))}</text>
          ${competence.nameLines.map((line) => `
            <text class="pack-label pack-person-name" x="${competence.x}" y="${line.y}" text-anchor="middle" font-size="${competence.personFontSize}">${escapeHtml(line.text)}</text>
          `).join("")}
        </g>
      `;
    }

    function clusterTooltip(cluster) {
      const names = cluster.competences.flatMap((competence) => competence.names);
      return [
        `Cluster: ${cluster.name}`,
        `Count: ${names.length}`,
        `Competences: ${cluster.competences.map((competence) => competence.name).join(", ")}`,
        `Names: ${names.join(", ")}`,
      ].join("\n");
    }

    function competenceTooltip(competence) {
      return [
        `Cluster: ${competence.cluster}`,
        `Competence: ${competence.name}`,
        `Count: ${competence.names.length}`,
        `Names: ${competence.names.join(", ")}`,
      ].join("\n");
    }

    function bindGraphZoomControls() {
      graphEl.querySelector(".pack-root").addEventListener("click", resetGraphZoom);
      graphEl.querySelector(".pack-root").addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          resetGraphZoom();
        }
      });

      graphEl.querySelectorAll(".pack-cluster-group").forEach((group) => {
        group.addEventListener("click", () => toggleClusterZoom(group.dataset.cluster));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleClusterZoom(group.dataset.cluster);
          }
        });
      });

    }

    function toggleClusterZoom(clusterName) {
      zoomedCluster = zoomedCluster === clusterName ? null : clusterName;
      renderGraph();
      setStatus(zoomedCluster ? `Zoomed into ${zoomedCluster}.` : "Showing all clusters.");
    }

    function resetGraphZoom() {
      if (!zoomedCluster) return;
      zoomedCluster = null;
      renderGraph();
      setStatus("Showing all clusters.");
    }

    function setGraphView(cluster, root) {
      if (!cluster) {
        graphEl.setAttribute("viewBox", `0 0 ${graphSize.width} ${graphSize.height}`);
        return;
      }
      const padding = Math.max(graphFocusPadding, cluster.r * 0.04);
      const width = Math.min(graphSize.width, (cluster.r + padding) * 2);
      const height = Math.min(graphSize.height, (cluster.r + padding) * 2);
      graphEl.setAttribute("viewBox", `${cluster.x - width / 2} ${cluster.y - height / 2} ${width} ${height}`);
    }

    function groupRows(data) {
      const map = new Map();
      data.forEach((row) => {
        const cluster = row.cluster.trim();
        const competence = row.competence.trim();
        const name = row.name.trim();
        if (!cluster || !competence || !name) return;
        if (!map.has(cluster)) map.set(cluster, new Map());
        const competences = map.get(cluster);
        if (!competences.has(competence)) competences.set(competence, []);
        competences.get(competence).push(name);
      });
      return [...map.entries()]
        .map(([name, competences]) => ({
          name,
          competences: [...competences.entries()]
            .map(([competence, names]) => ({
              name: competence,
              cluster: name,
              names: [...names].sort((a, b) => a.localeCompare(b, "sv")),
            }))
            .sort((a, b) => b.names.length - a.names.length || a.name.localeCompare(b.name, "sv")),
        }))
        .sort((a, b) => {
          const aCount = a.competences.reduce((sum, competence) => sum + competence.names.length, 0);
          const bCount = b.competences.reduce((sum, competence) => sum + competence.names.length, 0);
          return bCount - aCount || a.name.localeCompare(b.name, "sv");
        });
    }

    function layoutCirclePack(groups) {
      const center = { x: graphSize.width / 2, y: graphSize.height / 2 };
      const graphTargetRadius = Math.max(
        120,
        Math.min(graphSize.width, graphSize.height) / 2 - graphRootPadding
      );
      const clusterModels = groups.map((group, index) => {
        const color = palette[index % palette.length];
        const packedCompetences = packCircularItems(
          group.competences.map((competence) => ({
            name: competence.name,
            cluster: group.name,
            names: competence.names,
            ...measureCompetenceLayout(competence),
            fill: trafficLightColor(competence.names.length),
          })),
          { gap: 4, padding: 8 }
        );

        return {
          name: group.name,
          color,
          r: packedCompetences.r + clusterLabelReserve,
          packedCompetences: packedCompetences.items.map((competence) => ({
            ...competence,
            dy: competence.dy + clusterLabelReserve,
          })),
        };
      });

      const packedClusters = packCircularItems(clusterModels, { gap: 5, padding: 10 });
      const scaleBase = packedClusters.contentR || packedClusters.r;
      const scale = scaleBase > 0 ? graphTargetRadius / scaleBase : 1;
      const scaledPackedClusters = scalePackedItems(packedClusters, scale);
      const root = { ...center, r: Math.max(graphTargetRadius, scaledPackedClusters.contentR || scaledPackedClusters.r) };
      const clusters = scaledPackedClusters.items.map((cluster) => {
        const x = root.x + cluster.dx;
        const y = root.y + cluster.dy;
        return {
          ...cluster,
          x,
          y,
          competences: cluster.packedCompetences.map((competence) => ({
            ...competence,
            x: x + competence.dx,
            y: y + competence.dy,
            ...buildCompetenceText(competence, x + competence.dx, y + competence.dy),
          })),
        };
      });

      return { root, clusters };
    }

    function scalePackedItems(pack, scale) {
      if (scale === 1) return pack;
      return {
        r: pack.r * scale,
        contentR: typeof pack.contentR === "number" ? pack.contentR * scale : pack.contentR,
        items: pack.items.map((item) => scalePackedItem(item, scale)),
      };
    }

    function scalePackedItem(item, scale) {
      const scaled = {
        ...item,
        r: item.r * scale,
        contentR: typeof item.contentR === "number" ? item.contentR * scale : item.contentR,
        radius: item.radius * scale,
        dx: item.dx * scale,
        dy: item.dy * scale,
      };
      if (typeof item.titleFontSize === "number") scaled.titleFontSize = item.titleFontSize * scale;
      if (typeof item.personFontSize === "number") scaled.personFontSize = item.personFontSize * scale;
      if (typeof item.titleLineHeight === "number") scaled.titleLineHeight = item.titleLineHeight * scale;
      if (typeof item.personLineHeight === "number") scaled.personLineHeight = item.personLineHeight * scale;
      if (typeof item.titleAscent === "number") scaled.titleAscent = item.titleAscent * scale;
      if (typeof item.titleDescent === "number") scaled.titleDescent = item.titleDescent * scale;
      if (typeof item.personAscent === "number") scaled.personAscent = item.personAscent * scale;
      if (typeof item.personDescent === "number") scaled.personDescent = item.personDescent * scale;
      if (typeof item.titleLeading === "number") scaled.titleLeading = item.titleLeading * scale;
      if (typeof item.personLeading === "number") scaled.personLeading = item.personLeading * scale;
      if (item.packedCompetences) {
        scaled.packedCompetences = item.packedCompetences.map((competence) => scalePackedItem(competence, scale));
      }
      return scaled;
    }

    function trafficLightColor(count) {
      if (count < 2) return "var(--traffic-red)";
      if (count === 2) return "var(--traffic-orange)";
      return "var(--traffic-green)";
    }

    function packCircularItems(items, options = {}) {
      const gap = options.gap || 12;
      const padding = options.padding || 32;
      if (items.length === 0) return { r: padding, items: [] };
      if (items.length === 1) {
        const [item] = items;
        return { r: item.r + padding, items: [{ ...item, dx: 0, dy: -padding * 0.08 }] };
      }

      const sorted = [...items].sort((a, b) => b.r - a.r);
      const centerItem = sorted.length % 2 === 1 ? sorted.shift() : null;
      const positioned = [];
      let outer = 0;

      if (centerItem) {
        positioned.push({ ...centerItem, dx: 0, dy: -padding * 0.08 });
        outer = centerItem.r;
      }

      const ringSizes = buildRingSizes(sorted.length);
      let cursor = 0;
      let previousRing = centerItem ? { radius: 0, maxR: centerItem.r } : null;

      ringSizes.forEach((count, ringIndex) => {
        const ringItems = sorted.slice(cursor, cursor + count);
        cursor += count;
        const maxR = Math.max(...ringItems.map((item) => item.r));
        const chordRadius = count <= 1 ? 0 : ((maxR * 2 + gap) / (2 * Math.sin(Math.PI / count)));
        const radialRadius = previousRing ? previousRing.radius + previousRing.maxR + maxR + gap : 0;
        const radius = Math.max(chordRadius, radialRadius);
        const startAngle = -Math.PI / 2 + ringIndex * 0.23;

        ringItems.forEach((item, index) => {
          const angle = startAngle + (index / count) * Math.PI * 2;
          const dx = Math.cos(angle) * radius;
          const dy = Math.sin(angle) * radius;
          positioned.push({ ...item, dx, dy });
          outer = Math.max(outer, Math.hypot(dx, dy) + item.r);
        });

        previousRing = { radius, maxR };
      });

      return { r: outer + padding, contentR: outer, items: positioned };
    }

    function buildRingSizes(total) {
      const sizes = [];
      let remaining = total;
      let capacity = 7;
      while (remaining > 0) {
        const count = Math.min(remaining, capacity);
        sizes.push(count);
        remaining -= count;
        capacity += 6;
      }
      return sizes;
    }

    function buildCompetenceText(circle, x, y) {
      const lineTexts = circle.names;
      const titleBoxHeight = circle.titleAscent + circle.titleDescent;
      const personBoxHeight = circle.personAscent + circle.personDescent;
      const blockHeight = titleBoxHeight + circle.titleLeading + competenceBlockGap +
        lineTexts.length * personBoxHeight + Math.max(0, lineTexts.length - 1) * circle.personLeading;
      const top = y - blockHeight / 2;
      const titleY = top + circle.titleAscent;
      let cursor = top + titleBoxHeight + circle.titleLeading + competenceBlockGap;
      return {
        titleY,
        nameLines: lineTexts.map((name) => {
          const lineY = cursor + circle.personAscent;
          cursor += personBoxHeight + circle.personLeading;
          return {
            text: name,
            y: lineY,
          };
        }),
      };
    }

    function fitLabel(value, radius) {
      return String(value || "");
    }

    function measureCompetenceLayout(competence) {
      let titleFontSize = competenceTitleBaseSize;
      let personFontSize = competenceNameBaseSize;
      let radius = 0;
      let titleAscent = 0;
      let titleDescent = 0;
      let personAscent = 0;
      let personDescent = 0;
      let titleLeading = 0;
      let personLeading = 0;
      let titleLineHeight = 0;
      let personLineHeight = 0;

      for (let pass = 0; pass < 3; pass += 1) {
        const titleFont = `800 ${titleFontSize}px "Source Sans Pro", "Source Sans 3", "Segoe UI", sans-serif`;
        const personFont = `${personFontSize}px "Source Sans Pro", "Source Sans 3", "Segoe UI", sans-serif`;
        const titleMetrics = measureTextMetrics(competence.name, titleFont);
        const personMetrics = competence.names.map((name) => measureTextMetrics(name, personFont));
        const titleWidth = titleMetrics.width;
        const personWidths = personMetrics.map((metrics) => metrics.width);
        const maxWidth = Math.max(titleWidth, ...personWidths, 0);
        titleAscent = titleMetrics.ascent;
        titleDescent = titleMetrics.descent;
        personAscent = Math.max(...personMetrics.map((metrics) => metrics.ascent), 0);
        personDescent = Math.max(...personMetrics.map((metrics) => metrics.descent), 0);
        titleLeading = Math.max(6, Math.round(titleFontSize * 0.28));
        personLeading = Math.max(6, Math.round(personFontSize * 0.3));
        titleLineHeight = titleAscent + titleDescent + titleLeading;
        personLineHeight = personAscent + personDescent + personLeading;
        const textHeight = titleAscent + titleDescent + titleLeading + competenceBlockGap +
          competence.names.length * (personAscent + personDescent) +
          Math.max(0, competence.names.length - 1) * personLeading;
        radius = Math.hypot(maxWidth / 2, textHeight / 2) * competenceTextSafety +
          competencePadding + competenceLabelStrokePadding +
          Math.max(0, competence.names.length - 1) * competenceExtraNamePadding;

        const sizeBoost = clamp(0.95 + radius / 240, 1, 1.35);
        const nextTitleFontSize = clamp(competenceTitleBaseSize * sizeBoost, competenceTitleMinSize, competenceTitleMaxSize);
        const nextPersonFontSize = clamp(competenceNameBaseSize * sizeBoost, competenceNameMinSize, competenceNameMaxSize);
        if (
          Math.abs(nextTitleFontSize - titleFontSize) < 0.1 &&
          Math.abs(nextPersonFontSize - personFontSize) < 0.1
        ) {
          break;
        }
        titleFontSize = nextTitleFontSize;
        personFontSize = nextPersonFontSize;
      }

      const finalTitleFont = `800 ${titleFontSize}px "Source Sans Pro", "Source Sans 3", "Segoe UI", sans-serif`;
      const finalPersonFont = `${personFontSize}px "Source Sans Pro", "Source Sans 3", "Segoe UI", sans-serif`;
      const finalTitleMetrics = measureTextMetrics(competence.name, finalTitleFont);
      const finalPersonMetrics = competence.names.map((name) => measureTextMetrics(name, finalPersonFont));
      const finalTitleWidth = finalTitleMetrics.width;
      const finalPersonWidths = finalPersonMetrics.map((metrics) => metrics.width);
      const finalMaxWidth = Math.max(finalTitleWidth, ...finalPersonWidths, 0);
      titleAscent = finalTitleMetrics.ascent;
      titleDescent = finalTitleMetrics.descent;
      personAscent = Math.max(...finalPersonMetrics.map((metrics) => metrics.ascent), 0);
      personDescent = Math.max(...finalPersonMetrics.map((metrics) => metrics.descent), 0);
      titleLeading = Math.max(6, Math.round(titleFontSize * 0.28));
      personLeading = Math.max(6, Math.round(personFontSize * 0.3));
      titleLineHeight = titleAscent + titleDescent + titleLeading;
      personLineHeight = personAscent + personDescent + personLeading;
      const finalTextHeight = titleAscent + titleDescent + titleLeading + competenceBlockGap +
        competence.names.length * (personAscent + personDescent) +
        Math.max(0, competence.names.length - 1) * personLeading;
      radius = Math.hypot(finalMaxWidth / 2, finalTextHeight / 2) * competenceTextSafety +
        competencePadding + competenceLabelStrokePadding +
        Math.max(0, competence.names.length - 1) * competenceExtraNamePadding;

      return {
        r: radius,
        radius,
        titleFontSize,
        personFontSize,
        titleLineHeight,
        personLineHeight,
        titleAscent,
        titleDescent,
        personAscent,
        personDescent,
        titleLeading,
        personLeading,
      };
    }

    function measureTextWidth(text, font) {
      return measureTextMetrics(text, font).width;
    }

    function measureTextMetrics(text, font) {
      const key = `${font}|${text}`;
      if (textMeasureCache.has(key)) return textMeasureCache.get(key);
      const size = extractFontSize(font) || 12;
      if (!measureContext) {
        const fallback = { width: text.length * 7, ascent: size * 0.78, descent: size * 0.22 };
        textMeasureCache.set(key, fallback);
        return fallback;
      }
      measureContext.font = font;
      const measurement = measureContext.measureText(text);
      const metrics = {
        width: measurement.width,
        ascent: measurement.actualBoundingBoxAscent || size * 0.78,
        descent: measurement.actualBoundingBoxDescent || size * 0.22,
      };
      textMeasureCache.set(key, metrics);
      return metrics;
    }

    function extractFontSize(font) {
      const match = String(font).match(/(\d+(?:\.\d+)?)px/);
      return match ? Number(match[1]) : null;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    async function openCsvFile() {
      if (!window.showOpenFilePicker) {
        setStatus("Open CSV requires a browser with File System Access support. Use the embedded data or download workflow.");
        return;
      }
      try {
        [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: "Semicolon CSV", accept: { "text/csv": [".csv"] } }],
          multiple: false,
        });
        const file = await fileHandle.getFile();
        rows = parseCsv(await file.text());
        persistRows();
        zoomedCluster = null;
        render();
        setStatus(`Loaded ${file.name}. Browser state saved; edits can also be saved back to the selected file.`);
      } catch (error) {
        if (error.name !== "AbortError") setStatus(`Could not open CSV: ${error.message}`);
      }
    }

    async function loadCsvFromFileInput(event) {
      const [file] = event.currentTarget.files || [];
      if (!file) return;

      try {
        rows = parseCsv(await file.text());
        persistRows();
        zoomedCluster = null;
        render();
        setStatus(`Loaded ${file.name}. Browser state saved.`);
      } catch (error) {
        setStatus(`CSV validation error: ${error.message}`);
      } finally {
        event.currentTarget.value = "";
      }
    }

    async function saveCsvFile() {
      const csv = serializeCsv(rows);
      if (!window.showSaveFilePicker && !fileHandle) {
        downloadCsvFile();
        return;
      }

      try {
        if (!fileHandle) {
          fileHandle = await window.showSaveFilePicker({
            suggestedName: "testdata.csv",
            types: [{ description: "Semicolon CSV", accept: { "text/csv": [".csv"] } }],
          });
        }
        const writable = await fileHandle.createWritable();
        await writable.write(csv);
        await writable.close();
        setStatus("Saved semicolon CSV to file.");
      } catch (error) {
        if (error.name !== "AbortError") setStatus(`Could not save CSV: ${error.message}`);
      }
    }

    function downloadCsvFile() {
      const blob = new Blob([serializeCsv(rows)], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "testdata.csv";
      link.click();
      URL.revokeObjectURL(url);
      setStatus("Downloaded semicolon CSV file.");
    }

    async function saveGraphPng() {
      const svgText = serializeGraphSvg();
      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const image = new Image();

      try {
        await new Promise((resolve, reject) => {
          image.onload = resolve;
          image.onerror = reject;
          image.src = url;
        });

        const canvas = document.createElement("canvas");
        canvas.width = 1800;
        canvas.height = 1200;
        const context = canvas.getContext("2d");
        context.fillStyle = "#f4fbfe";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((pngBlob) => {
          if (!pngBlob) {
            setStatus("Could not create PNG.");
            return;
          }
          const pngUrl = URL.createObjectURL(pngBlob);
          const link = document.createElement("a");
          link.href = pngUrl;
          link.download = "kompetenskarta.png";
          link.click();
          URL.revokeObjectURL(pngUrl);
          setStatus("Downloaded graph as PNG.");
        }, "image/png");
      } catch (error) {
        setStatus(`Could not save PNG: ${error.message || "image export failed"}`);
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    function serializeGraphSvg() {
      const clone = graphEl.cloneNode(true);
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      clone.setAttribute("width", "1800");
      clone.setAttribute("height", "1200");
      inlineSvgStyles(graphEl, clone);
      clone.insertAdjacentHTML("afterbegin", `
        <style>
          .pack-root { fill: rgba(215, 242, 251, 0.52); stroke: #141f69; stroke-width: 2; stroke-dasharray: 8 7; }
          .pack-cluster { stroke-width: 2.5; fill-opacity: 0.28; }
          .pack-competence { stroke: #64748b; stroke-width: 1.8; }
          .pack-label { fill: #141f30; font-family: "Source Sans Pro", "Segoe UI", sans-serif; paint-order: stroke; stroke: white; stroke-width: 5px; stroke-linejoin: round; }
          .pack-cluster-label { fill: #1f2937; font-weight: 800; }
          .pack-competence-name { font-weight: 800; }
          .pack-person-name { fill: #586377; }
        </style>
        <rect x="-10000" y="-10000" width="20000" height="20000" fill="#f4fbfe"></rect>
      `);
      return new XMLSerializer().serializeToString(clone);
    }

    function inlineSvgStyles(source, clone) {
      const sourceNodes = [source, ...source.querySelectorAll("*")];
      const cloneNodes = [clone, ...clone.querySelectorAll("*")];
      const properties = [
        ["fill", "fill"],
        ["stroke", "stroke"],
        ["strokeWidth", "stroke-width"],
        ["fillOpacity", "fill-opacity"],
        ["strokeOpacity", "stroke-opacity"],
        ["fontSize", "font-size"],
        ["fontWeight", "font-weight"],
        ["fontFamily", "font-family"],
      ];
      sourceNodes.forEach((node, index) => {
        const target = cloneNodes[index];
        if (!target) return;
        const style = getComputedStyle(node);
        properties.forEach(([property, attribute]) => {
          const value = style[property];
          if (value && value !== "none" && value !== "normal") {
            target.setAttribute(attribute, value);
          }
        });
      });
    }

    function parseCsv(text) {
      const source = String(text || "").trim();
      if (!source) return [];

      const delimiter = detectDelimiter(source);
      const records = parseRecords(source, delimiter)
        .map((record) => record.map((field) => field.trim()))
        .filter((record) => record.some(Boolean));

      if (records.length === 0) return [];

      const [head, ...body] = records;
      const normalizedHead = head.map((name) => name.toLowerCase());
      const index = Object.fromEntries(normalizedHead.map((name, position) => [name, position]));
      const missing = headers.filter((field) => typeof index[field] !== "number");
      if (missing.length > 0) {
        throw new Error(`Missing required column${missing.length > 1 ? "s" : ""}: ${missing.join(", ")}`);
      }

      return body
        .map((record) => ({
          competence: record[index.competence] || "",
          name: record[index.name] || "",
          cluster: record[index.cluster] || "",
        }))
        .filter((row) => row.competence || row.name || row.cluster);
    }

    function detectDelimiter(text) {
      const candidates = [";", ",", "\t"];
      const preferred = candidates.find((delimiter) => {
        const [head = []] = parseRecords(text, delimiter).filter((record) => record.some(Boolean));
        const normalizedHead = head.map((name) => name.trim().toLowerCase());
        return headers.every((field) => normalizedHead.includes(field));
      });
      if (preferred) return preferred;

      return candidates
        .map((delimiter) => ({
          delimiter,
          width: Math.max(...parseRecords(text, delimiter).slice(0, 4).map((record) => record.length)),
        }))
        .sort((a, b) => b.width - a.width)[0].delimiter;
    }

    function parseRecords(text, delimiter) {
      const records = [];
      let record = [];
      let field = "";
      let quoted = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && quoted && next === '"') {
          field += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === delimiter && !quoted) {
          record.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") index += 1;
          record.push(field);
          records.push(record);
          record = [];
          field = "";
        } else {
          field += char;
        }
      }

      record.push(field);
      records.push(record);
      return records;
    }

    function serializeCsv(data) {
      return [
        headers.join(";"),
        ...data.map((row) => headers.map((field) => encodeField(row[field])).join(";")),
      ].join("\n") + "\n";
    }

    function encodeField(value) {
      const text = String(value || "");
      return /[";\n\r]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function setStatus(message) {
      statusEl.textContent = `${message} ${describeRows()}`;
    }

    function describeRows() {
      const validRows = rows.filter((row) => row.competence?.trim() && row.name?.trim() && row.cluster?.trim());
      const groups = groupRows(validRows);
      const competenceCount = groups.reduce((sum, group) => sum + group.competences.length, 0);
      return `${validRows.length} rows · ${groups.length} clusters · ${competenceCount} competences.`;
    }
  </script>
</body>
</html>
